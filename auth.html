<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>GoRoute | Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">
  <script src="assets/js/supabase.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --blue:       #3B9EE8;
      --blue-dark:  #1A6FB0;
      --blue-mid:   #6DBAF1;
      --blue-pale:  #F0F9FF;
      --blue-light: #EBF5FD;
      --accent:     #FF6B6B;
      --amber:      #FFA552;
      --text:       #1A2940;
      --text2:      #4A6080;
      --text3:      #8BA5BE;
      --white:      #FFFFFF;
      --border:     #D6ECFA;
      --bg:         #F4F9FD;
      --radius:     14px;
      --shadow:     0 4px 24px rgba(59,158,232,.12);
    }

    html, body {
      height: 100%;
      font-family: 'Nunito', sans-serif;
      background: linear-gradient(160deg, #1A6FB0 0%, #3B9EE8 50%, #6DBAF1 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    /* ─── Phone Shell ─── */
    .phone {
      width: 390px;       /* fixed — never let content stretch the shell */
      min-width: 390px;
      max-width: 390px;
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      position: relative;
      overflow: hidden;
    }

    @media (max-width: 440px) {
      .phone {
        width: 100%;
        min-width: 0;
        max-width: 100%;
      }
    }

    @media (min-height: 700px) and (min-width: 440px) {
      .phone {
        min-height: 780px;
        max-height: 900px;
        border-radius: 40px;
        box-shadow: 0 40px 80px rgba(10,30,60,.45), 0 0 0 1px rgba(255,255,255,.12);
        overflow: hidden;
      }
      body { padding: 24px; }
    }

    /* ─── Hero Top ─── */
    .auth-hero {
      background: linear-gradient(145deg, var(--blue-dark) 0%, var(--blue) 100%);
      padding: 48px 32px 36px;
      position: relative;
      overflow: hidden;
      flex-shrink: 0;
    }
    .auth-hero::before {
      content: '';
      position: absolute;
      width: 260px; height: 260px;
      border-radius: 50%;
      background: rgba(255,255,255,.07);
      top: -80px; right: -60px;
    }
    .auth-hero::after {
      content: '';
      position: absolute;
      width: 160px; height: 160px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
      bottom: -40px; left: -20px;
    }

    .hero-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
      position: relative; z-index: 1;
    }
    .hero-icon {
      width: 40px; height: 40px;
      background: rgba(255,255,255,.18);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .hero-wordmark {
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.3px;
    }
    .hero-wordmark span { color: rgba(255,255,255,.6); }

    .hero-bus {
      display: block;
      margin: 0 auto 20px;
      position: relative; z-index: 1;
    }
    .hero-text {
      position: relative; z-index: 1;
    }
    .hero-text h1 {
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      line-height: 1.25;
      margin-bottom: 6px;
    }
    .hero-text p {
      font-size: 12px;
      color: rgba(255,255,255,.68);
      line-height: 1.6;
    }

    /* ─── Form Card ─── */
    .auth-body {
      flex: 1;
      background: var(--bg);
      border-radius: 28px 28px 0 0;
      margin-top: -20px;
      padding: 28px 24px 32px;
      overflow-y: auto;
      position: relative;
      z-index: 2;
    }

    /* ─── Tab Switch ─── */
    .tab-switch {
      display: flex;
      background: var(--blue-light);
      border-radius: 12px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      width: 0; /* combined with flex:1 forces equal widths regardless of label length */
      padding: 9px;
      border: none;
      border-radius: 9px;
      background: none;
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      font-weight: 700;
      color: var(--text2);
      cursor: pointer;
      transition: all .2s;
      white-space: nowrap;
      text-align: center;
    }
    .tab-btn.active {
      background: var(--white);
      color: var(--blue-dark);
      box-shadow: 0 2px 8px rgba(59,158,232,.15);
    }

    /* ─── Forms ─── */
    .auth-form { display: none; }
    .auth-form.active { display: block; }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 10px;
      font-weight: 700;
      color: var(--text2);
      letter-spacing: .6px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .input-wrap { position: relative; }
    .input-wrap svg.icon {
      position: absolute;
      left: 13px; top: 50%;
      transform: translateY(-50%);
      width: 15px; height: 15px;
      color: var(--text3);
      pointer-events: none;
    }
    .input-wrap input {
      width: 100%;
      padding: 12px 14px 12px 38px;
      background: var(--white);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 14px;
      color: var(--text);
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    .input-wrap input:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(59,158,232,.1);
    }
    .input-wrap input::placeholder { color: var(--text3); }

    .field-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    /* ─── Submit Button ─── */
    .auth-btn {
      width: 100%;
      padding: 14px;
      background: var(--blue);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-top: 6px;
      transition: background .2s, transform .1s, box-shadow .2s;
      box-shadow: 0 4px 14px rgba(59,158,232,.35);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .auth-btn:active { transform: scale(.98); }
    .auth-btn:hover  { background: var(--blue-dark); }

    /* ─── Alert ─── */
    .alert {
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 14px;
      display: none;
      line-height: 1.5;
    }
    .alert.error   { background: #FFF0F0; border: 1px solid #FFCDD2; color: #C0392B; }
    .alert.success { background: #F0FFF4; border: 1px solid #C6F6D5; color: #276749; }
    .alert.show    { display: block; }

    /* ─── Divider ─── */
    .or-divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 18px 0;
      color: var(--text3);
      font-size: 11px;
      font-weight: 700;
    }
    .or-divider::before,
    .or-divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ─── Footer note ─── */
    .auth-note {
      text-align: center;
      font-size: 11px;
      color: var(--text3);
      margin-top: 20px;
      line-height: 1.6;
    }
    .auth-note a {
      color: var(--blue);
      font-weight: 700;
      text-decoration: none;
    }

    /* ─── Password toggle ─── */
    .pw-toggle {
      position: absolute;
      right: 13px; top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text3);
      padding: 0;
      display: flex;
      align-items: center;
    }

    /* ─── Spinner ─── */
    .spinner {
      display: inline-block;
      width: 15px; height: 15px;
      border: 2px solid rgba(255,255,255,.35);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Splash Screen ─── */
    .splash-screen {
      position: absolute;
      inset: 0;
      background: linear-gradient(160deg, var(--blue-dark) 0%, var(--blue) 55%, #6DBAF1 100%);
      display: flex;
      flex-direction: column;
      z-index: 10;
      overflow: hidden;
    }
    .splash-screen.hidden {
      pointer-events: none;
      animation: splashFadeOut .35s ease forwards;
    }
    @keyframes splashFadeOut {
      to { opacity: 0; transform: scale(1.04); }
    }
    .splash-top {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 32px 28px;
      position: relative;
    }
    .splash-top::before {
      content: '';
      position: absolute;
      width: 320px; height: 320px;
      border-radius: 50%;
      background: rgba(255,255,255,.06);
      top: -80px; right: -80px;
    }
    .splash-top::after {
      content: '';
      position: absolute;
      width: 180px; height: 180px;
      border-radius: 50%;
      background: rgba(255,255,255,.05);
      bottom: 20px; left: -40px;
    }
    .splash-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 32px;
      position: relative; z-index: 1;
    }
    .splash-logo-icon {
      width: 44px; height: 44px;
      background: rgba(255,255,255,.18);
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      backdrop-filter: blur(4px);
    }
    .splash-wordmark {
      font-family: 'Poppins', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      letter-spacing: -.3px;
    }
    .splash-wordmark span { color: rgba(255,255,255,.55); }
    .splash-bus {
      position: relative; z-index: 1;
      margin-bottom: 28px;
      filter: drop-shadow(0 8px 24px rgba(0,0,0,.2));
    }
    .splash-tagline {
      font-family: 'Poppins', sans-serif;
      font-size: 22px;
      font-weight: 800;
      color: #fff;
      text-align: center;
      line-height: 1.25;
      margin-bottom: 10px;
      position: relative; z-index: 1;
    }
    .splash-sub {
      font-size: 12px;
      color: rgba(255,255,255,.7);
      text-align: center;
      line-height: 1.6;
      max-width: 260px;
      position: relative; z-index: 1;
    }
    .splash-dots {
      display: flex;
      gap: 6px;
      margin-top: 24px;
      position: relative; z-index: 1;
    }
    .splash-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,.35);
    }
    .splash-dot.active {
      width: 22px;
      border-radius: 4px;
      background: #fff;
    }
    .splash-bottom {
      background: rgba(255,255,255,.08);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255,255,255,.12);
      padding: 24px 28px 32px;
    }
    .splash-get-started {
      display: block;
      width: 100%;
      padding: 15px;
      background: #fff;
      color: var(--blue-dark);
      border: none;
      border-radius: var(--radius);
      font-family: 'Nunito', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      margin-bottom: 12px;
      transition: transform .15s, box-shadow .15s;
      box-shadow: 0 4px 20px rgba(0,0,0,.15);
    }
    .splash-get-started:active { transform: scale(.98); }
    .splash-have-account {
      text-align: center;
      font-size: 12px;
      color: rgba(255,255,255,.7);
    }
    .splash-have-account a {
      color: #fff;
      font-weight: 800;
      text-decoration: none;
    }

    /* ─── Terms ─── */
    .terms-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin: 12px 0 4px;
    }
    .terms-row input[type=checkbox] { margin-top: 2px; flex-shrink: 0; accent-color: var(--blue); }
    .terms-row label { font-size: 11px; color: var(--text3); line-height: 1.5; font-weight: 600; }
    .terms-row label a { color: var(--blue); text-decoration: none; font-weight: 700; }
  </style>
</head>
<body>

<div class="phone">

  <!-- ── Splash / Onboarding ── -->
  <div class="splash-screen" id="splashScreen">
    <div class="splash-top">
      <div class="splash-logo">
        <div class="splash-logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
            <rect x="1" y="7" width="22" height="12" rx="3" fill="rgba(255,255,255,.9)"/>
            <rect x="3"  y="9" width="4" height="4" rx="1" fill="#3B9EE8"/>
            <rect x="9"  y="9" width="4" height="4" rx="1" fill="#3B9EE8"/>
            <rect x="15" y="9" width="4" height="4" rx="1" fill="#3B9EE8"/>
            <circle cx="6"  cy="21" r="2" fill="rgba(255,255,255,.9)"/>
            <circle cx="18" cy="21" r="2" fill="rgba(255,255,255,.9)"/>
          </svg>
        </div>
        <div class="splash-wordmark">Go<span>Route</span></div>
      </div>

      <svg class="splash-bus" width="220" height="110" viewBox="0 0 80 50" fill="none">
        <rect x="2"  y="12" width="72" height="28" rx="6" fill="rgba(255,255,255,.2)"/>
        <rect x="2"  y="12" width="72" height="28" rx="6" stroke="rgba(255,255,255,.35)" stroke-width="1"/>
        <rect x="6"  y="16" width="14" height="12" rx="2" fill="rgba(255,255,255,.6)"/>
        <rect x="24" y="16" width="14" height="12" rx="2" fill="rgba(255,255,255,.6)"/>
        <rect x="42" y="16" width="14" height="12" rx="2" fill="rgba(255,255,255,.6)"/>
        <rect x="58" y="16" width="12" height="12" rx="2" fill="rgba(255,255,255,.6)"/>
        <rect x="2"  y="33" width="72" height="7"  rx="3" fill="rgba(0,0,0,.12)"/>
        <circle cx="16" cy="42" r="5" fill="rgba(0,0,0,.25)"/>
        <circle cx="16" cy="42" r="2.5" fill="rgba(255,255,255,.6)"/>
        <circle cx="58" cy="42" r="5" fill="rgba(0,0,0,.25)"/>
        <circle cx="58" cy="42" r="2.5" fill="rgba(255,255,255,.6)"/>
        <rect x="60" y="20" width="4" height="8" rx="1" fill="#FFA552"/>
        <rect x="0"  y="22" width="4" height="4"  rx="1" fill="#FF6B6B"/>
      </svg>

      <div class="splash-tagline">Travel anywhere,<br>anytime</div>
      <div class="splash-sub">Thousands of buses at your fingertips. Book seats and travel stress-free.</div>

      <div class="splash-dots">
        <div class="splash-dot active"></div>
        <div class="splash-dot"></div>
        <div class="splash-dot"></div>
      </div>
    </div>

    <div class="splash-bottom">
      <button class="splash-get-started" onclick="dismissSplash('signup')">Get Started</button>
      <div class="splash-have-account">Already have an account? <a href="#" onclick="dismissSplash('login'); return false;">Sign In</a></div>
    </div>
  </div>

  <!-- ── Hero ── -->
  <div class="auth-hero">
    <div class="hero-logo">
      <div class="hero-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
          <rect x="1" y="7" width="22" height="12" rx="3" fill="rgba(255,255,255,.9)"/>
          <rect x="3" y="9" width="4" height="4" rx="1" fill="#3B9EE8"/>
          <rect x="9" y="9" width="4" height="4" rx="1" fill="#3B9EE8"/>
          <rect x="15" y="9" width="4" height="4" rx="1" fill="#3B9EE8"/>
          <circle cx="6"  cy="21" r="2" fill="rgba(255,255,255,.9)"/>
          <circle cx="18" cy="21" r="2" fill="rgba(255,255,255,.9)"/>
        </svg>
      </div>
      <div class="hero-wordmark">Go<span>Route</span></div>
    </div>

    <svg class="hero-bus" width="180" height="90" viewBox="0 0 80 50" fill="none">
      <rect x="2" y="12" width="72" height="28" rx="6" fill="rgba(255,255,255,.18)"/>
      <rect x="6"  y="16" width="14" height="12" rx="2" fill="rgba(255,255,255,.55)"/>
      <rect x="24" y="16" width="14" height="12" rx="2" fill="rgba(255,255,255,.55)"/>
      <rect x="42" y="16" width="14" height="12" rx="2" fill="rgba(255,255,255,.55)"/>
      <rect x="58" y="16" width="12" height="12" rx="2" fill="rgba(255,255,255,.55)"/>
      <rect x="2"  y="33" width="72" height="7" rx="3" fill="rgba(255,255,255,.1)"/>
      <circle cx="16" cy="42" r="5" fill="rgba(255,255,255,.2)"/>
      <circle cx="16" cy="42" r="2.5" fill="rgba(255,255,255,.7)"/>
      <circle cx="58" cy="42" r="5" fill="rgba(255,255,255,.2)"/>
      <circle cx="58" cy="42" r="2.5" fill="rgba(255,255,255,.7)"/>
      <rect x="60" y="20" width="4" height="8" rx="1" fill="#FFA552"/>
      <rect x="0"  y="22" width="4" height="4" rx="1" fill="#FF6B6B"/>
    </svg>

    <div class="hero-text">
      <h1>Book · Travel · Explore</h1>
      <p>Fast, reliable bus booking across the Philippines.</p>
    </div>
  </div>

  <!-- ── Form Body ── -->
  <div class="auth-body">

    <div id="alertBox" class="alert error"></div>

    <!-- Tab Switch -->
    <div class="tab-switch">
      <button class="tab-btn active" id="loginTab" onclick="switchAuthTab('login')">Sign In</button>
      <button class="tab-btn" id="signupTab" onclick="switchAuthTab('signup')">Create Account</button>
    </div>

    <!-- ── LOGIN FORM ── -->
    <form class="auth-form active" id="loginForm" onsubmit="handleLogin(event)">
      <div class="field">
        <label for="loginEmail">Email Address</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="loginEmail" placeholder="you@email.com" autocomplete="email" required>
        </div>
      </div>

      <div class="field">
        <label for="loginPassword">Password</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="loginPassword" placeholder="Your password" autocomplete="current-password" required>
          <button type="button" class="pw-toggle" onclick="togglePw('loginPassword', this)" tabindex="-1">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <button type="submit" class="auth-btn" id="loginBtn">Sign In</button>

      <div class="auth-note" style="margin-top:14px;">
        Forgot your password? <a href="#" onclick="handleForgotPassword(event)">Reset it</a>
      </div>
    </form>

    <!-- ── SIGNUP FORM ── -->
    <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)">
      <div class="field-row">
        <div class="field">
          <label for="signupFirst">First Name</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="signupFirst" placeholder="Maria" autocomplete="given-name" required>
          </div>
        </div>
        <div class="field">
          <label for="signupLast">Last Name</label>
          <div class="input-wrap">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
            <input type="text" id="signupLast" placeholder="Santos" autocomplete="family-name" required>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="signupEmail">Email Address</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
          <input type="email" id="signupEmail" placeholder="you@email.com" autocomplete="email" required>
        </div>
      </div>

      <div class="field">
        <label for="signupPhone">Mobile Number</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg>
          <input type="tel" id="signupPhone" placeholder="+63 912 345 6789" autocomplete="tel">
        </div>
      </div>

      <div class="field">
        <label for="signupPassword">Password</label>
        <div class="input-wrap">
          <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          <input type="password" id="signupPassword" placeholder="Min. 8 characters" autocomplete="new-password" required minlength="8">
          <button type="button" class="pw-toggle" onclick="togglePw('signupPassword', this)" tabindex="-1">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          </button>
        </div>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="agreeTerms" required>
        <label for="agreeTerms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button type="submit" class="auth-btn" id="signupBtn">Create Account</button>
    </form>

  </div><!-- /auth-body -->
</div><!-- /phone -->

<script src="assets/js/app.js"></script>
<script>
  // ── Splash dismiss ──
  function dismissSplash(tab) {
    const splash = document.getElementById('splashScreen');
    splash.classList.add('hidden');
    splash.addEventListener('animationend', () => splash.remove(), { once: true });
    if (tab) switchAuthTab(tab);
  }

  // ── Tab switcher ──
  function switchAuthTab(tab) {
    document.getElementById('loginForm').classList.toggle('active', tab === 'login');
    document.getElementById('signupForm').classList.toggle('active', tab === 'signup');
    document.getElementById('loginTab').classList.toggle('active', tab === 'login');
    document.getElementById('signupTab').classList.toggle('active', tab === 'signup');
    hideAlert();
  }

  // ── Password visibility toggle ──
  function togglePw(inputId, btn) {
    const input = document.getElementById(inputId);
    const isText = input.type === 'text';
    input.type = isText ? 'password' : 'text';
    btn.innerHTML = isText
      ? `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`
      : `<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/></svg>`;
  }

  // ── Alert helpers (used by app.js) ──
  function showAlert(msg, type = 'error') {
    const el = document.getElementById('alertBox');
    el.textContent = msg;
    el.className = `alert ${type} show`;
    el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }
  function hideAlert() {
    const el = document.getElementById('alertBox');
    el.className = 'alert error';
  }

  // ── Login handler (calls app.js handleLogin) ──
  async function handleLogin(e) {
    e.preventDefault();
    hideAlert();
    const btn = document.getElementById('loginBtn');
    btn.innerHTML = '<span class="spinner"></span> Signing in…';
    btn.disabled = true;

    const email    = document.getElementById('loginEmail').value.trim();
    const password = document.getElementById('loginPassword').value;

    const { error } = await sb.auth.signInWithPassword({ email, password });

    if (error) {
      showAlert(error.message);
      btn.innerHTML = 'Sign In';
      btn.disabled = false;
    } else {
      btn.innerHTML = '✓ Redirecting…';
      if (email.toLowerCase() === 'admin@goroute.com') {
        window.location.href = 'admin.html';
      } else {
        window.location.replace('index.html');
      }
    }
  }

  // ── Signup handler ──
  async function handleSignup(e) {
    e.preventDefault();
    hideAlert();
    const btn = document.getElementById('signupBtn');
    btn.innerHTML = '<span class="spinner"></span> Creating…';
    btn.disabled = true;

    const first    = document.getElementById('signupFirst').value.trim();
    const last     = document.getElementById('signupLast').value.trim();
    const email    = document.getElementById('signupEmail').value.trim();
    const phone    = document.getElementById('signupPhone').value.trim();
    const password = document.getElementById('signupPassword').value;

    const { data, error } = await sb.auth.signUp({
      email,
      password,
      options: {
        data: { first_name: first, last_name: last, phone },
        emailRedirectTo: window.location.origin + '/auth.html'
      }
    });

    if (error) {
      showAlert(error.message);
      btn.innerHTML = 'Create Account';
      btn.disabled = false;
      return;
    }

    // Insert profile row
    if (data.user) {
      await sb.from('users').insert([{
        id: data.user.id,
        first_name: first,
        last_name: last,
        email,
        phone,
        role: 'passenger'
      }]);
    }

    showAlert('Account created! Check your email to confirm.', 'success');
    btn.innerHTML = 'Create Account';
    btn.disabled = false;
    switchAuthTab('login');
  }

  // ── Forgot password ──
  async function handleForgotPassword(e) {
    e.preventDefault();
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) { showAlert('Enter your email above first.'); return; }
    const { error } = await sb.auth.resetPasswordForEmail(email, {
      redirectTo: window.location.origin + '/auth.html'
    });
    if (error) showAlert(error.message);
    else showAlert('Reset link sent! Check your inbox.', 'success');
  }
</script>
</body>
</html>
